# nginx/nginx.conf
# Configuração do NGINX como proxy reverso.

server {
    # NGINX escuta na porta 80 dentro do container
    listen 8080;

    # ── Frontend estático ────────────────────────────────
    # Qualquer requisição para / serve os arquivos da pasta html/
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # ── Proxy reverso para o FastAPI ─────────────────────
    # Requisições para /api/ são encaminhadas ao container fastapi
    # O NGINX remove o prefixo /api antes de repassar (proxy_pass com /)
    location /api/ {
        proxy_pass http://fastapi:8080/;
    }
}

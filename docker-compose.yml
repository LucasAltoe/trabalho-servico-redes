# docker-compose.yml
# Este arquivo define TODOS os serviços da aplicação.
# Para subir tudo de uma vez, basta rodar: docker compose up --build

version: "3.9"

# ─────────────────────────────────────────────
# REDE
# Todos os containers vão se comunicar por esta
# rede interna. Nenhum deles precisa expor porta
# ao hospedeiro, exceto o NGINX.
# ─────────────────────────────────────────────
networks:
  netatividade01:
    driver: bridge

# ─────────────────────────────────────────────
# VOLUMES
# Usamos volume para que os dados do banco não
# se percam quando o container for reiniciado.
# ─────────────────────────────────────────────
volumes:
  dados-postgres:

# ─────────────────────────────────────────────
# SERVIÇOS
# ─────────────────────────────────────────────
services:

  # ── 1. BANCO DE DADOS ──────────────────────
  postgres:
    image: postgres:15          # Usa a imagem oficial do PostgreSQL
    container_name: postgres    # Nome do container (usado para identificar na rede)

    environment:                # Variáveis de ambiente que o PostgreSQL lê na inicialização
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - dados-postgres:/var/lib/postgresql/data   # Persiste os dados neste volume

    networks:
      - netatividade01          # Conecta à rede interna

    # Healthcheck: o Docker fica verificando se o banco está pronto antes de
    # liberar os outros containers que dependem dele.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 2. BACKEND (FastAPI) ───────────────────
  fastapi:
    build:
      context: ./backend        # Usa o Dockerfile que está dentro da pasta /backend
    container_name: fastapi

    environment:                # Passa as configurações do banco para o backend
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres   # "postgres" é o nome do container acima, resolvido pela rede interna
      POSTGRES_PORT: 5432

    networks:
      - netatividade01

    # O FastAPI só inicia DEPOIS que o PostgreSQL estiver saudável (healthcheck OK)
    depends_on:
      postgres:
        condition: service_healthy

  # ── 3. SERVIDOR WEB (NGINX) ────────────────
  nginx:
    image: nginx:alpine         # Usa a imagem oficial do NGINX (versão leve)
    container_name: nginx

    # Única porta exposta ao hospedeiro.
    # Formato: "PORTA_DO_HOSPEDEIRO:PORTA_DO_CONTAINER"
    ports:
      - "80:8080"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro   # Configuração do NGINX
      - ./nginx/html:/usr/share/nginx/html:ro                  # Arquivos do frontend

    networks:
      - netatividade01

    depends_on:
      - fastapi

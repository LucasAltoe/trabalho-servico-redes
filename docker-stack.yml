version: "3.8"

networks:
  rede-cluster:
    driver: overlay
    attachable: true

volumes:
  dados-postgres:
  dados-loki:

secrets:
  db_password:
    external: true

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: grupo1
      POSTGRES_DB: usuarios_db
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - dados-postgres:/var/lib/postgresql/data
    networks:
      - rede-cluster
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.camada == dados

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - dados-loki:/loki
    networks:
      - rede-cluster
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.camada == dados

  fastapi:
    image: grupo1-fastapi:latest
    environment:
      POSTGRES_USER: grupo1
      POSTGRES_DB: usuarios_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      LOKI_URL: http://loki:3100
    secrets:
      - db_password
    networks:
      - rede-cluster
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.camada == app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    networks:
      - rede-cluster
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.camada == app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
    networks:
      - rede-cluster
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.camada == app
